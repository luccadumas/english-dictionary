[build]
builder = "DOCKERFILE"
dockerfilePath = "Dockerfile"
dockerfileTarget = "runner"

watchPatterns = ["backend/**", "Dockerfile", "railway.toml", ".dockerignore"]

[deploy]
startCommand = "sh docker-entrypoint.sh"
healthcheckPath = "/"
healthcheckTimeout = 300
restartPolicyType = "ON_FAILURE"
